<div class="min-h-screen bg-gray-50">
  <div class="max-w-6xl mx-auto px-6 py-10">

    @if (!isFeedbackPage() && !isLoading()) {
      <app-stepper [steps]="steps" [currentStepIndex]="currentStepIndex()" [formValid]="isFormValid()" [maxAccessibleStep]="maxAccessibleStep()" (stepClick)="onStepClick($event)" />
    }

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 m-8">
      @if (isLoading()) {
        <div class="flex justify-center items-center py-16">
          <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-[var(--color-primary)]"></div>
        </div>
      } @else {
        <router-outlet />
      }
    </div>

    @if (!isFeedbackPage() && !isLoading()) {
      <div class="flex items-center m-8" [class.justify-end]="isFirstStep()" [class.justify-between]="!isFirstStep()">
        @if (!isFirstStep()) {
          <button
            type="button"
            (click)="goPrev()"
            class="px-6 py-2.5 rounded-3xl border-1 border-[var(--color-primary)] text-[var(--color-primary)] text-sm font-bold transition-colors duration-200 hover:bg-[var(--color-primary)] hover:text-white cursor-pointer"
          >
            Voltar
          </button>
        }

        @if (!isLastStep()) {
          <button
            type="button"
            (click)="goNext()"
            [disabled]="!isFormValid()"
            class="px-6 py-2.5 rounded-3xl bg-[var(--color-primary)] text-white text-sm font-bold transition-colors duration-200 hover:bg-[var(--color-secondary)] cursor-pointer border-0 disabled:opacity-50 disabled:cursor-not-allowed"
          >
            Próximo
          </button>
        } @else {
          <button
            type="button"
            [disabled]="!canSave() || isSaving()"
            (click)="saveProfile()"
            class="px-6 py-2.5 rounded-3xl bg-[var(--color-primary)] text-white text-sm font-bold transition-colors duration-200 hover:bg-[var(--color-secondary)] cursor-pointer border-0 disabled:opacity-50 disabled:cursor-not-allowed"
          >
            @if (isSaving()) {
              Salvando...
            } @else {
              Finalizar
            }
          </button>
        }
      </div>
    }

  </div>
</div>
