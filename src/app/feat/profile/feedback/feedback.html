<div class="flex flex-col items-center justify-center min-h-[400px] space-y-6">
  <div class="w-20 h-20 rounded-full flex items-center justify-center" [class.bg-green-100]="isSuccess" [class.bg-red-100]="!isSuccess">
    @if (isSuccess) {
      <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
      </svg>
    } @else {
      <svg class="w-10 h-10 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
      </svg>
    }
  </div>

  <div class="text-center space-y-2">
    <h2 class="text-2xl font-bold" [class.text-green-700]="isSuccess" [class.text-red-700]="!isSuccess">
      @if (isSuccess) {
        Sucesso!
      } @else {
        Erro
      }
    </h2>
    <p class="text-gray-600">{{ message }}</p>
  </div>

  <button
    type="button"
    (click)="goBack()"
    class="px-6 py-2.5 rounded-3xl bg-[var(--color-primary)] text-white text-sm font-bold transition-colors duration-200 hover:bg-[var(--color-secondary)] cursor-pointer border-0"
  >
    Voltar ao Início
  </button>
</div>
